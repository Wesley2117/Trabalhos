<body>
    <button onclick="fazerPergunta()">Clique aqui para saber se vc é gay!!</button>

    <script>
        function fazerPergunta() {
            // Faz a pergunta ao usuário
            let resposta = prompt("Voçe é gay?? (Responda Sim ou Não)");
            
            // Verifica a resposta e exibe uma mensagem apropriada
            if (resposta.toLowerCase() === "sim") {
                alert("Pse, voçe é gay.");
            } else if (resposta.toLowerCase() === "não") {
                alert("Não adianta mentir, voçé é gay!");
            } else {
                alert("Não importa, voçe é gay");
            }
        }
    </script>
     <hr>
     <h1>Para saber se voçe é gay!!</h1>
